name: Keep Supabase Awake

on:
  schedule:
    # 10:00 ICT = 03:00 UTC, every 3 days.
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate HEARTBEAT_URL
        env:
          HEARTBEAT_URL: ${{ vars.HEARTBEAT_URL }}
        run: |
          if [ -z "$HEARTBEAT_URL" ]; then
            echo "::error::HEARTBEAT_URL repo variable is not set."
            echo "Add it under Settings → Secrets and variables → Actions → Variables."
            echo 'Example: https://for-princess.vercel.app/api/heartbeat'
            exit 1
          fi

      - name: Ping heartbeat
        env:
          HEARTBEAT_URL: ${{ vars.HEARTBEAT_URL }}
        run: |
          set -euo pipefail
          response=$(curl --silent --show-error --fail --retry 3 --retry-delay 5 \
            --max-time 30 -w '\n%{http_code}' "$HEARTBEAT_URL")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_code"
          echo "Body:   $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Heartbeat returned HTTP $http_code"
            exit 1
          fi
